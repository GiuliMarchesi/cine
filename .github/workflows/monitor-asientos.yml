name: Monitor de asientos

on:
  schedule:
    # Cada 10 minutos, con desfase para evitar la congestión de la hora exacta.
    - cron: "7,17,27,37,47,57 * * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: monitor-asientos
  cancel-in-progress: false

jobs:
  revisar:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      SHOWCASE_USUARIO: ${{ secrets.SHOWCASE_USUARIO }}
      SHOWCASE_PASSWORD: ${{ secrets.SHOWCASE_PASSWORD }}
      WHATSAPP_TELEFONO: ${{ secrets.WHATSAPP_TELEFONO }}
      CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
      HEADLESS: "true"

    steps:
      - name: Descargar el proyecto
        uses: actions/checkout@v6

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Revisar los asientos
        id: monitor
        shell: bash
        run: |
          set +e
          python bot.py --once
          status=$?
          set -e

          if [ "$status" -eq 10 ]; then
            echo "notificado=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "notificado=false" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Detener el monitor después del aviso
        # Una prueba manual puede encontrar asientos y enviar un mensaje, pero
        # no debe apagar la programación. Sólo se detiene tras un aviso surgido
        # de una revisión automática.
        if: steps.monitor.outputs.notificado == 'true' && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow disable monitor-asientos.yml
